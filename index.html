<head>
  <meta charset="utf-8" />

  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Salih Salman" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="lang-switcher" aria-label="Language">
    <button class="lang-trigger" id="langTrigger" aria-haspopup="listbox" aria-expanded="false">
      <span class="lang-flag" id="langFlag">🇹🇷</span>
      <span class="lang-code" id="langCode">TR</span>
      <svg class="lang-caret" viewBox="0 0 20 20" aria-hidden="true"><path d="M5 8l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <ul class="lang-menu" id="langMenu" role="listbox" hidden></ul>
  </div>

  <header class="hero">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="avatar">
      <img class="avatar-img" src="assets/headshot.jpg" alt="Salih Salman" width="144" height="144" decoding="async" />
    </div>
    <h1 class="name" id="name">Salih Salman</h1>
    <p class="eyebrow" id="role">Real Estate Consultant</p>
    <p class="tagline" id="tagline">Dünya Property · Alanya, Antalya</p>
  </header>

  <section class="quick-actions" aria-label="Quick actions">
    <a class="qa" id="qaPhone" href="#" aria-label="Call">
      <span class="qa-icon" data-icon="phone"></span>
    </a>
    <a class="qa" id="qaEmail" href="#" aria-label="Email">
      <span class="qa-icon" data-icon="mail"></span>
    </a>
    <a class="qa" id="qaMap" href="#" target="_blank" rel="noopener" aria-label="Map">
      <span class="qa-icon" data-icon="pin"></span>
    </a>
  </section>

  <main class="content">
    <button class="add-contact" id="addContact">
      <span class="ac-icon" data-icon="userPlus"></span>
      <span id="addContactLabel">Kişi Ekle</span>
    </button>

    <section class="info-list" aria-label="Contact info">
      <a class="info-row" id="rowPhone" href="#">
        <span class="info-ic" data-icon="phone"></span>
        <span class="info-text">
          <span class="info-label" data-i18n="phone">Telefon</span>
          <span class="info-value" id="valPhone"></span>
        </span>
      </a>
      <a class="info-row" id="rowEmail" href="#">
        <span class="info-ic" data-icon="mail"></span>
        <span class="info-text">
          <span class="info-label" data-i18n="email">E-posta</span>
          <span class="info-value" id="valEmail"></span>
        </span>
      </a>
      <a class="info-row" id="rowWebsite" href="#" target="_blank" rel="noopener">
        <span class="info-ic" data-icon="globe"></span>
        <span class="info-text">
          <span class="info-label" data-i18n="website">İnternet sitesi</span>
          <span class="info-value" id="valWebsite"></span>
        </span>
      </a>
      <div class="info-row info-row--static">
        <span class="info-ic" data-icon="pin"></span>
        <span class="info-text">
          <span class="info-label" data-i18n="location">Konum</span>
          <span class="info-value" id="valLocation"></span>
          <a class="map-chip" id="mapChip" href="#" target="_blank" rel="noopener">
            <span data-i18n="showOnMap">Haritada Göster</span>
          </a>
        </span>
      </div>
      <div class="info-row info-row--static">
        <span class="info-ic" data-icon="briefcase"></span>
        <span class="info-text">
          <span class="info-label" data-i18n="company">Şirket</span>
          <span class="info-value" id="valCompany"></span>
        </span>
      </div>
    </section>

    <section class="socials" id="socials" aria-label="Social"></section>

    <footer class="foot">
      <span id="footName">© Dünya Property</span>
      <span class="foot-url" id="footUrl" hidden></span>
      <span class="credit" id="credit"></span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
