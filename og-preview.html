<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      color: #fff;
      background:
        radial-gradient(900px 500px at 50% -60px, #26406e 0%, transparent 60%),
        linear-gradient(180deg, #0f1e3d 0%, #0a152d 100%);
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 14% 22%, rgba(255,255,255,0.14), transparent 60%),
        radial-gradient(1.5px 1.5px at 78% 16%, rgba(255,255,255,0.10), transparent 60%),
        radial-gradient(1.5px 1.5px at 62% 74%, rgba(255,255,255,0.08), transparent 60%),
        radial-gradient(1.5px 1.5px at 32% 82%, rgba(255,255,255,0.07), transparent 60%);
      pointer-events: none;
    }
    .card {
      position: absolute;
      inset: 56px;
      border: 1px solid rgba(232, 217, 180, 0.28);
      border-radius: 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 64px;
      padding: 56px 72px 56px 56px;
      align-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.005));
    }
    .card::before, .card::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(60%, 480px);
      height: 1px;
    }
    .card::before { top: 28px; background: linear-gradient(90deg, transparent, rgba(176,138,71,0.5), transparent); }
    .card::after  { bottom: 28px; background: linear-gradient(90deg, transparent, #b08a47, transparent); }

    .avatar {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px rgba(232, 217, 180, 0.35),
        0 0 0 12px rgba(232, 217, 180, 0.08),
        0 0 0 14px rgba(176, 138, 71, 0.6),
        0 40px 80px -20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      justify-self: end;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.95) contrast(1.02);
    }

    .text { display: flex; flex-direction: column; align-items: flex-start; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: #c8a366;
      margin-bottom: 18px;
    }
    .eyebrow::before, .eyebrow::after {
      content: "";
      width: 28px;
      height: 1px;
      background: #b08a47;
      opacity: 0.75;
    }
    .eyebrow::after { display: none; }

    .name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      font-size: 92px;
      line-height: 0.96;
      letter-spacing: 0.005em;
      color: #fff;
    }

    .tagline {
      margin-top: 20px;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.78);
    }

    .meta {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid rgba(232, 217, 180, 0.25);
      display: flex;
      gap: 36px;
      font-size: 18px;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.88);
      width: 100%;
    }
    .meta strong {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #b08a47;
      margin-bottom: 6px;
    }

    .mono { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar"><img src="assets/headshot.jpg" alt="" /></div>
    <div class="text">
      <span class="eyebrow">Real Estate Consultant</span>
      <h1 class="name">Salih Salman</h1>
      <p class="tagline">Dünya Property · Alanya, Antalya, Türkiye</p>
      <div class="meta">
        <div><strong>Phone</strong><span class="mono">+90 555 061 66 66</span></div>
        <div><strong>Web</strong>dunyaproperty.com</div>
      </div>
    </div>
  </div>
</body>
</html>
